<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flexbox2</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap');

        .container2 {
            max-width: 1440px;
            max-height: 863px;
            padding: 30px 10px;
            display: flex;
            justify-content: space-between;
            margin: 0 auto;
            gap: 40px;
            align-items: center;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 50px;

            justify-content: space-between;
        }

        .hamburger {
            display: none;
        }



        a {
            font-family: "Space Grotesk", sans-serif;
            text-decoration: none;
            color: #191A23;
            font-size: 20px;
            font-weight: 400;
            line-height: 28px;
        }

        .request {
            background-color: white;
            font-family: "Space Grotesk", sans-serif;
            color: #191A23;
            border: 1px solid #191A23;
            border-radius: 14px;
            padding: 20px 35px;
            text-align: center;
            display: inline-block;
            font-size: 20px;
            line-height: 28px;
            margin: 4px 2px;
        }

        .container {
            max-width: 1440px;
            max-height: 863px;
            padding: 50px 100px;
            display: flex;
            margin: 0 auto;
            gap: 370px;
            justify-content: space-between;
            align-items: flex-start;
        }


        .describe {
            width: 531px;
            height: 481px;
            gap: 35px;
        }

        h1,
        p {
            color: #191A23;
            font-family: "Space Grotesk", sans-serif;
        }

        h1 {
            font-size: 60px;
            font-weight: 500;
            line-height: 120%;
        }

        p {
            font-weight: 400;
            font-size: 20px;
            line-height: 28px;
        }

        .book {
            background-color: #191A23;
            font-family: "Space Grotesk", sans-serif;
            color: #F3F3F3;
            border: 1px solid #191A23;
            border-radius: 14px;
            padding: 20px 35px;
            text-align: center;
            display: inline-block;
            font-size: 19px;
            font-weight: 400;
            line-height: 28px;
            margin: 4px 2px;
            width: 264px;
            height: 68px;
        }

        .img {
            width: 600.46px;
            height: 515px;
        }

        .company {
            height: 48px;
            padding: 40px 10px;
            display: flex;
            justify-content: space-between;
            margin: 0px 115.667px;
            gap: 20px;
        }
    </style>

</head>

<body>

    <div class="container2">

        <div class="logo">
            <img src="image/Frame 9.png" width="100%">
        </div>

        <div class="header">
            <div> About Us</div>
            <div>Services</div>
            <div>Use Cases</div>
            <div>Pricing</div>
            <div>Blog</div>
            <div> <button class="request">Request a quote</button></div>

        </div>
        <div class="hamburger">=</div>

    </div>

    </div>

    <div class="container">

        <div class="describe">
            <h1>Navigating the digital landscape for success</h1>
            <p>Our digital marketing agency helps businesses grow and succeed online through a range of service include
                SEO, PPC, social media marketing, and content creation.</p>
            <button class="book">Book a consultation</button>
        </div>

        <div class="img">
            <img src="image/Illustration.png" width="100%">
        </div>

    </div>

    <div class="company">
        <img src="image/Company logo.jpg" width="124.11px">
        <img src="image/Company logo (1).jpg" width="126.37px">
        <img src="image/Company logo (2).jpg" width="128.63px">
        <img src="image/Company logo (3).jpg" width="145.55px">
        <img src="image/Company logo (4).jpg" width="125.24px">
        <img src="image/Company logo (5).jpg" width="110.57px">
    </div>

</body>

</html>
