<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Menu</title>

    <style>
        .container {
            width: 100%;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .header {
            flex: 1;
            display: flex;
            justify-content: center;
            gap: 60px;
        }

        .orange {
            color: #ff5a1f;
            font-weight: bold;
        }

        .container2 img {
            width: 20px;
            height: auto;
        }

        .logo img {
            width: 180px;

        }

        .container2 {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .icon {
            width: 20px;
            height: auto;
        }

        .Number {
            font-size: 16px;
        }

        .button {
            width: 90px;
            height: 42px;
            background-color: #ff5a1f;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="logo">
            <img src="image/logo-light-retina.png">
        </div>

        <div class="header">
            <div>Home</div>
            <div class="orange">Services</div>
            <div>Work</div>
            <div>Project Details</div>
            <div>Contact</div>

        </div>

        <div class="container2">
            <img src="image/Group 64.png" class="icon">
            <div>555-123-4567</div>
            <button class="button">Contact</button>
        </div>

    </div>










</body>

</html>
































</html>
