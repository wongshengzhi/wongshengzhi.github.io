<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 1</title>
</head>

<body>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 30px;
        }

        button {
            margin: 10px;
            cursor: pointer;
        }

        /* Request now */
        .button1 {
            background: black;
            color: white;
            border: none;
            padding: 12px 20px;
        }

        /* Sign up */
        .button2 {
            background: #5cb85c;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 12px 25px;
            font-weight: bold;
        }

        /* Add to Cart */
        .button3 {
            background: #f4d03f;
            border: none;
            border-radius: 25px;
            padding: 12px 50px;
        }

        /* Get started */
        .button4 {
            background: #7d5bb8;
            color: white;
            border: none;
            border-radius: 3px;
            padding: 12px 25px;
            font-weight: bold;
        }

        /* Download */
        .button5 {
            background: white;
            color: gray;
            border: 1px solid gray;
            padding: 12px 25px;
            font-weight: bold;
        }

        /* Apply on company website */
        .button6 {
            background: #2f67c8;
            color: white;
            border: none;
            border-radius: 25px;
            padding: 12px 25px;
            font-weight: bold;
        }

        /*save */
        .button7 {
            background: white;
            color: #2f67c8;
            border: 2px solid #2f67c8;
            border-radius: 5px;
            padding: 12px 25px;
            font-weight: bold;
        }
    </style>
    </head>

    <body>
        <button class="button1">Request now</button>
        <button class="button2">Sign up</button>
        <button class="button3">Add to Cart</button>
        <br>
        <button class="button4">Get started</button>
        <button class="button5">Download</button>
        <button class="button6">Apply on company website</button>
        <button class="button7">Save</button>
    </body>

</html>
